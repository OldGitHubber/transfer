<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Person Form</title>
  <link rel="stylesheet" href="form-style.css">
</head>

<body>
  <form action="/person" method="post" enctype="application/x-www-form-urlencoded">
    <h2>Person Details</h2>

    <div class="form-group">
      <label for="fName">First Name</label>
      <input id="fName" name="fName" type="text" placeholder="Enter first name" required>
    </div>

    <div class="form-group">
      <label for="lName">Last Name</label>
      <input id="lName" name="lName" type="text" placeholder="Enter last name" required>
    </div>

    <div class="form-group">
      <label for="age">Age</label>
      <input id="age" name="age" type="number" required>
    </div>

    <fieldset>
      <legend>Priority</legend>

      <label for="priority-high">High</label>
      <input id="priority-high" type="radio" name="priority" value="high" required>

      <label for="priority-medium">Medium</label>
      <input id="priority-medium" type="radio" name="priority" value="medium">

      <label for="priority-low">Low</label>
      <input id="priority-low" type="radio" name="priority" value="low">
    </fieldset>

    <div class="checkbox">
      <input id="checkMe" type="checkbox" name="checkMe" >
      <label for="checkMe">Check me</label>
    </div>
    <div class="submit">
      <button type="submit">Submit Me</button>
    </div>
  </form>
</body>
</html>

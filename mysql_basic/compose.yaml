services:
  mysql_demo:
    build:
      context: .
    image: mysql_demo
    container_name: mysql_demo
    environment:
      MYSQL_HOST: mysql
    ports:
      - "4000:3000"
    restart: always
    # depends_on:
    #  - mysql
    # depends_on:
    #   mysql:
    #     condition: service_healthy 

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_DATABASE: mysql_demo_db
    
    ports:
      - "3306:3306"
    volumes:
      - data:/var/lib/mysql
      # - ./dbinit:/docker-entrypoint-initdb.d

    # healthcheck:
    #   test: ["CMD-SHELL", "mysql -uadmin -padmin -e 'SELECT 1'"]
    #   interval: 5s
    #   timeout: 5s
    #   retries: 10

volumes:
  data:

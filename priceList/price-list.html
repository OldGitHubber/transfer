<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="price-list.css">
  <script src="price-list.js" defer></script>
  <title>Price List</title>
</head>

<body>
  <h1 class="title" id="title">Welcome to our store</h1>
  <div id="priceListDiv"></div> <!-- can't just create a table here as the prices will change -->
  
  <input type="checkbox" id="cbStyleId">
  <label for="cbStyleId">Enable styling</label>

   <div class="storeStatusRb">
    <input type="radio" name="rbShopStatus" id="rbOpen" checked>
    <label for="rbOpen">Open</label>
    <input type="radio" name="rbShopStatus" id="rbClosed">
    <label for="rbClosed">Closed</label>
  </div>
  
  <p class="thanks">Thanks for shopping with us</p>
</body>

</html>

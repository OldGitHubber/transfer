services:
  app:
    build:
      context: .
    image: app
    container_name: app
    ports:
      - "4000:3000"   # host:container
    environment:
      MYSQL_HOST: mysql

    restart: unless-stopped
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: people
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
    ports:
      - "3306:3306"
    restart: unless-stopped

    volumes:
      - data:/var/lib/mysql

volumes:
  data: